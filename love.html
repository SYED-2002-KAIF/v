<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle, #023086, #4b4a4a);
  font-family: Arial, sans-serif;
  overflow: hidden;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* PHONE CARD */
.phone {
  width: 90%;
  max-width: 360px;
  background: rgba(0,0,0,0.25);
  border-radius: 25px;
  padding: 20px;
  text-align: center;
  backdrop-filter: blur(10px);
}

/* SLIDESHOW */
.slideshow {
  width: 100%;
  height: 300px;
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 20px;
}

.slideshow img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.7s ease-in-out;
}

h1 {
  font-size: 1.8rem;
  margin: 10px 0;
}

p {
  font-size: 1.1rem;
  margin: 5px 0;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="tum.mp3" type="audio/mpeg">
</audio>

<div class="phone">

  <!-- SLIDESHOW -->
  <div class="slideshow">
    <img id="slide" src="photo1.jpeg" alt="memories">
  </div>

  <h1>I Love You khushii ❤️</h1>
  <p>You are my forever 💍</p>
  <p>She said YES 💖</p>

</div>

<script>
const images = [
  "photo1.jpeg",
  "photo2.jpeg",
  "photo3.jpeg",
  "photo4.jpeg",
  "photo5.jpeg",
  "photo6.jpeg",
  "photo7.jpeg"
];

let index = 0;
const slide = document.getElementById("slide");

setInterval(() => {
  index = (index + 1) % images.length;
  slide.style.opacity = 0;

  setTimeout(() => {
    slide.src = images[index];
    slide.style.opacity = 1;
  }, 300);

  setTimeout(() => {
    window.location.href = "Final Letter.png";
  }, 8000);

}, 2000); // 🔥 2 seconds (FAST)
</script>

</body>
</html>
