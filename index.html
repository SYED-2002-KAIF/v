<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kushi❤️ My Valentine</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

/* Blurred background */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("final.jpeg") center/cover no-repeat;
  filter: blur(10px) brightness(0.6);
  z-index: -1;
}

/* Tap overlay */
#tap {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  z-index: 10;
  cursor: pointer;
}

/* Main container */
.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;   /* IMPORTANT */
  text-align: center;
  padding: 20px;
}

.container img {
  width: 90%;
  max-width: 280px;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.7);
  margin-bottom: 10px;
}

h1 {
  font-size: 2.2rem;
  margin: 6px 0;
}

p {
  font-size: 1.1rem;
  margin: 6px 0;
}

h2 {
  font-size: 1.3rem;
  margin: 10px 0;
}

/* Buttons */
.buttons {
  display: flex;
  gap: 20px;
  margin-top: 10px;
}

button {
  padding: 14px 30px;
  font-size: 1.1rem;
  border-radius: 30px;
  border: none;
  font-weight: bold;
}

#yes {
  background: white;
  color: #ff1e56;
}

#no {
  background: transparent;
  border: 2px solid white;
  color: white;
}

.tease {
  margin-top: 10px;
  color: #ffd6e0;
  font-size: 1.05rem;
}

/* ===== MOBILE FIX ===== */
@media (max-width: 600px) {
  .container img {
    max-width: 230px;
  }

  h1 {
    font-size: 1.9rem;
  }

  p {
    font-size: 1rem;
  }

  h2 {
    font-size: 1.15rem;
  }

  .buttons {
    margin-top: 8px;
  }
}
</style>
</head>

<body>

<!-- MUSIC (muted trick – WORKS EVERYWHERE) -->
<audio id="song" muted loop>
  <source src="tum.mp3" type="audio/mpeg">
</audio>

<!-- TAP SCREEN -->
<div id="tap">Tap anywhere ❤️</div>

<!-- CONTENT -->
<div class="container">
  <img src="final.jpeg" alt="photo">

  <h1>khushii ❤️</h1>
  <p>Tum hi ho… meri duniya 💕</p>

  <h2>Will you be my Valentine? 💍</h2>

  <div class="buttons">
    <button id="yes">YES 💖</button>
    <button id="no">NO 🙈</button>
  </div>

  <div id="tease" class="tease"></div>
</div>

<script>
const audio = document.getElementById("song");
const tap = document.getElementById("tap");
const tease = document.getElementById("tease");

// Tap to start music
tap.onclick = async () => {
  await audio.play();   // allowed because muted
  audio.muted = false;  // unmute after play
  tap.style.display = "none";
};

// YES button
document.getElementById("yes").onclick = () => {
  window.location.href = "love.html";
};

// NO button teasing
const lines = [
  "Are you sure? 😏",
  "Think again khushii ❤️",
  "My heart says YES 💖",
  "You know you want to 😌",
  "Okay… last chance 😍"
];
let i = 0;

document.getElementById("no").onclick = () => {
  tease.innerText = lines[i % lines.length];
  i++;
};
</script>

</body>
</html>
